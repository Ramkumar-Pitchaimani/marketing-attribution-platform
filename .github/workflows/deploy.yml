name: Deploy Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.REGION }}
  SERVICE_NAME: ${{ vars.SERVICE_NAME }}

jobs:

  deploy:

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Setup Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      run: |
        gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

    - name: Build Docker Image
      run: |
        docker build \
          -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/marketing-repo/marketing-etl:${{ github.sha }} \
          ./Cloudrun

    - name: Push Docker Image
      run: |
        docker push \
          ${REGION}-docker.pkg.dev/${PROJECT_ID}/marketing-repo/marketing-etl:${{ github.sha }}

    - name: Deploy Cloud Run
      run: |
        gcloud run deploy ${SERVICE_NAME} \
          --image=${REGION}-docker.pkg.dev/${PROJECT_ID}/marketing-repo/marketing-etl:${{ github.sha }} \
          --region=${REGION} \
          --platform=managed \
          --allow-unauthenticated